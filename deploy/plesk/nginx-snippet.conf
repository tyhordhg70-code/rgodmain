# AutoResolve — Plesk Custom Nginx Directives
#
# In Plesk:
#   Websites & Domains → refundgod.fans → Apache & Nginx Settings
#   → Additional Nginx directives (paste the entire block below)
#
# This proxies all /api/* requests to the Node.js API server (PM2 on port 3000)
# and serves the React frontend static files from httpdocs/.

# Increase upload size for photo attachments
client_max_body_size 10m;

# ── API proxy → Node.js (PM2) on port 3000 ───────────────────────────────────
location /api/ {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# ── React SPA fallback (all non-API, non-file paths → index.html) ─────────────
location / {
    root   /var/www/vhosts/refundgod.fans/httpdocs;
    try_files $uri $uri/ /index.html;
    index  index.html;
}
