kind = "web"
previewPath = "/"
title = "Secure Response Hub"
version = "1.0.0"
id = "artifacts/secure-response-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24027
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/secure-response-hub run dev"

[services.env]
PORT = "24027"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/secure-response-hub", "run", "build"]
publicDir = "artifacts/secure-response-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
